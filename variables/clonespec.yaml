# Variable "cloneSpec" — spec de clonage des VMs Proxmox
#
# C'est la variable la plus riche du ClusterClass. Elle regroupe :
#   - sshAuthorizedKeys : clés SSH injectées dans les VMs via cloud-init
#   - virtualIPNetworkInterface : interface réseau pour le VIP kube-vip
#   - vmTemplate.templateTag : TAG du template Proxmox à cloner
#     → IMPORTANT : le template Proxmox DOIT avoir ce tag
#     → ex: "v1-35-5" pour kubernetes 1.35.5 (remplacer les . par -)
#   - machineSpec.controlPlane : overrides de spec VM pour les nœuds CP
#   - machineSpec.workerNode   : overrides de spec VM pour les workers
#   - machineSpec.loadBalancer : overrides pour éventuel nœud LB dédié
#
# Seul vmTemplate.templateTag est REQUIS.
# machineSpec est optionnel — si non fourni, la spec du template Proxmox est utilisée.
#
# En pratique dans un Cluster CR (voir clusters/k3s-app/cluster.yaml) :
#   variables:
#   - name: cloneSpec
#     value:
#       sshAuthorizedKeys: ["ecdsa-sha2-nistp256 ..."]
#       vmTemplate:
#         templateTag: "v1-35-5"
#       machineSpec:
#         controlPlane:
#           numCores: 4
#           memoryMiB: 16384
#           disks:
#             bootVolume:
#               disk: scsi0
#               sizeGb: 20
- op: add
  path: /spec/variables/-
  value:
    name: cloneSpec
    required: false
    schema:
      openAPIV3Schema:
        type: object
        required:
        - vmTemplate
        properties:
          sshAuthorizedKeys:
            type: array
            items:
              type: string
            default: []
          virtualIPNetworkInterface:
            type: string
            default: ""
            example: "vmbr0"
          vmTemplate:
            type: object
            required:
            - templateTag
            properties:
              templateTag:
                type: string
                example: "v1-35-5"
          machineSpec:
            type: object
            properties:
              controlPlane: &machineSpec
                type: object
                properties:
                  disks:
                    type: object
                    properties:
                      bootVolume:
                        type: object
                        properties:
                          disk:
                            type: string
                          sizeGb:
                            type: integer
                            minimum: 5
                            format: int32
                        required:
                        - disk
                        - sizeGb
                  format:
                    type: string
                    enum: [raw, qcow2, vmdk]
                  network:
                    type: object
                    properties:
                      default:
                        type: object
                        properties:
                          bridge:
                            type: string
                          model:
                            type: string
                            default: virtio
                            enum: [e1000, virtio, rtl8139, vmxnet3]
                        required:
                        - bridge
                      additionalDevices:
                        type: array
                        items:
                          type: object
                          properties:
                            bridge:
                              type: string
                            name:
                              minLength: 1
                              type: string
                            model:
                              type: string
                              default: virtio
                              enum: [e1000, virtio, rtl8139, vmxnet3]
                          required:
                          - bridge
                          - name
                    required:
                    - default
                  memoryMiB:
                    type: integer
                    example: 4096
                  numCores:
                    type: integer
                    example: 2
                  numSockets:
                    type: integer
                    example: 1
              workerNode: *machineSpec
              loadBalancer: *machineSpec
