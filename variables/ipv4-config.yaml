# Variable "ipv4Config" — pool d'adresses IPv4 + gateway pour les nœuds du cluster
#
# CAPMOX utilise ce champ pour générer automatiquement un InClusterIPPool
# dédié à CHAQUE cluster (nommé <cluster>-v4-icip), utilisé comme source IP
# par défaut pour tout networkDevice qui n'a pas son propre ipPoolRef.
# → C'est désormais la SEULE source d'allocation IP du projet (voir templates/
#   proxmox-machine-template-cp.yaml et -worker.yaml — ipPoolRef volontairement
#   absent pour éviter une double allocation / collision d'IP).
#
# Chaque Cluster CR (mgmt, k3s-app, ...) DOIT définir un range disjoint des
# autres clusters et de tout ce qui est déjà utilisé sur le réseau (VIP, etc.).
- op: add
  path: /spec/variables/-
  value:
    name: ipv4Config
    required: true
    schema:
      openAPIV3Schema:
        type: object
        required:
        - addresses
        - gateway
        properties:
          addresses:
            type: array
            items:
              type: string
            example: ["192.168.40.2-192.168.40.20"]
          gateway:
            type: string
            example: "192.168.40.254"
          prefix:
            type: integer
            default: 24
