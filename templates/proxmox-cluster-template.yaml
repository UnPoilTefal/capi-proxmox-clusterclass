# =============================================================================
# ProxmoxClusterTemplate — template d'infrastructure cluster Proxmox
# =============================================================================
#
# RÔLE :
#   CAPMOX instancie un ProxmoxCluster depuis ce template pour chaque Cluster CR.
#   ProxmoxCluster représente le "côté Proxmox" du cluster K8s :
#     - les nœuds Proxmox autorisés à accueillir des VMs
#     - l'endpoint du kube-apiserver (VIP géré par kube-vip)
#     - les DNS injectés dans cloud-init des VMs
#
# VALEURS DYNAMIQUES :
#   controlPlaneEndpoint, allowedNodes, dnsServers ET ipv4Config sont injectés
#   par le patch ProxmoxClusterTemplateGeneral.yaml depuis les variables du
#   Cluster CR.
#
# ipv4Config : C'EST LA SEULE SOURCE D'ALLOCATION IP DU PROJET.
#   CAPMOX génère automatiquement un InClusterIPPool dédié par cluster
#   (<cluster>-v4-icip) à partir de ce champ. Chaque Cluster CR doit fournir
#   un range disjoint via la variable ipv4Config (voir variables/ipv4-config.yaml).
#   → NE PAS ajouter d'ipPoolRef sur les networkDevices des ProxmoxMachineTemplate
#   (cf. commentaire IPAM dans proxmox-machine-template-cp.yaml) : combiner les
#   deux mécanismes crée 2 IPAddressClaim par device, parfois avec LA MÊME IP
#   (chaque pool alloue indépendamment "la première IP libre") → collision
#   réseau réelle, vécue et corrigée le 2026-06-16.
#
# credentialsRef : référence vers le Secret contenant les credentials API Proxmox.
#   Sans namespace explicite, le CRD résout dans le même namespace que le
#   ProxmoxCluster (toujours caprox-kubernetes-engine ici) — donc le Secret
#   "capmox-manager-credentials" doit exister DANS CE NAMESPACE (en plus de
#   l'instance dans proxmox-infrastructure-system utilisée par le provider lui-même).
#   Sans ce champ, le contrôleur échoue avec "No credentials found, ProxmoxCluster
#   missing credentialsRef" — il n'y a pas de fallback global fonctionnel dans
#   cette installation (Cluster API Operator, sans flag de credential par défaut).
# =============================================================================
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
kind: ProxmoxClusterTemplate
metadata:
  name: proxmox-clusterclass-v0.2.0-clustertemplate
spec:
  template:
    spec:
      credentialsRef:
        name: capmox-manager-credentials

      # Optimisation mémoire : 0 = la VM utilise exactement la RAM configurée
      # (pas de ballooning Proxmox). À ajuster si tu manques de RAM sur les hosts.
      schedulerHints:
        memoryAdjustment: 0

      # Ces valeurs sont des placeholders — elles seront remplacées par le patch
      # ProxmoxClusterTemplateGeneral.yaml depuis les variables controlPlaneEndpoint,
      # allowedNodes et dnsServers du Cluster CR.
      controlPlaneEndpoint:
        host: 10.10.10.11   # remplacé par variable
        port: 6443

      dnsServers:
      - 8.8.8.8              # remplacé par variable

      # Plage IP "placebo" : requise par l'API mais pas utilisée pour l'allocation.
      # L'IPAM réel est géré par l'InClusterIPPool "clusterclass-ipv4" référencé
      # dans proxmox-machine-template-cp.yaml et proxmox-machine-template-worker.yaml.
      # → garder cohérent avec ton subnet (192.168.40.0/24).
      ipv4Config:
        addresses:
        - 192.168.40.2-192.168.40.20
        prefix: 24
        gateway: 192.168.40.254
