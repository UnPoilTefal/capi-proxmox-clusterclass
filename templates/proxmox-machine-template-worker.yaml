# =============================================================================
# ProxmoxMachineTemplate — spec VM pour les nœuds Workers
# =============================================================================
#
# Identique au template CP (proxmox-machine-template-cp.yaml) mais pour les
# workers. Les patches WorkerNode* appliquent les specs définies dans la variable
# cloneSpec.machineSpec.workerNode du Cluster CR.
#
# Si les workers et CP partagent la même spec (cas courant en homelab),
# tu peux ne définir que controlPlane dans machineSpec et laisser workerNode vide
# → les valeurs du template (ci-dessous) seront utilisées telles quelles.
#
# IPAM : pas d'ipPoolRef ici, même raison que proxmox-machine-template-cp.yaml
# (l'IP vient du pool auto-généré par ipv4Config sur ProxmoxCluster).
# =============================================================================
kind: ProxmoxMachineTemplate
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
metadata:
  name: proxmox-clusterclass-v0.1.0-workertemplate
spec:
  template:
    spec:
      templateSelector:
        matchTags:
        - "v1-35-5"   # remplacé par le patch WorkerNodeSetup.yaml
      format: qcow2
      full: true
      network:
        networkDevices:
        - name: net0
          bridge: vmbr40
          model: virtio
