# =============================================================================
# KubeadmControlPlaneTemplate — configuration kubeadm des nœuds CP
# =============================================================================
#
# RÔLE :
#   Définit comment kubeadm initialise et joint les nœuds control-plane.
#   Injectés ici :
#     1. kube-vip (pod statique pour le VIP du kube-apiserver)
#     2. Workaround kube-vip/kubeadm ≥ v1.29
#     3. provider-id au format CAPMOX (requis par CAPI pour lier Machine→Node)
#     4. cloud-provider: external (requis pour activer le CCM externe)
#     5. --node-ip dynamique (requis par le CCM en K8s ≥ 1.33)
#
# PATCHES APPLIQUÉS DESSUS (via ClusterClass patches) :
#   - ControlPlaneSetup.yaml : injecte SSH keys + kube-vip static pod manifest
#   - kube-proxy-setup.yaml  : configure kube-proxy en mode ipvs (si activé)
#
# PROVIDER-ID ET CCM :
#   kubelet pose provider-id = proxmox://<uuid cloud-init> sur le Node dès le boot.
#   CAPMOX pose le même UUID sur ProxmoxMachine.spec.providerID → CAPI peut lier
#   Machine→Node via ce providerID commun.
#   Le CCM sergelogvinov ne touche PAS spec.providerID si déjà set (immutable) ;
#   il initialise le Node via lookup hostname→VM dans l'API Proxmox, et set
#   InternalIP depuis l'annotation alpha.kubernetes.io/provided-node-ip (posée
#   par kubelet quand --node-ip est fourni — requis depuis K8s 1.33 où
#   --cloud-provider a été retiré de kubelet).
#
# /etc/hosts :
#   L'image Packer inclut 127.0.0.1 localhost via le template cloud-init
#   (roles/common — hosts.debian.tmpl). Le preKubeadmCommand l'ajoute aussi
#   en ceinture+bretelles, et ajoute l'IP propre de la VM pour la résolution
#   du hostname local (utilisé par etcd, apiserver, et les health checks).
#
# IMMUTABILITÉ KubeadmControlPlaneTemplate :
#   spec.template.spec est immutable une fois appliqué → tout changement de
#   contenu exige un renommage (v3→v4→v5...). Le ClusterClass référence la
#   version courante ; les clusters existants continuent avec l'ancienne.
# =============================================================================
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlaneTemplate
metadata:
  name: proxmox-kubernetes-engine-v4
spec:
  template:
    spec:
      kubeadmConfigSpec:
        clusterConfiguration:
          apiServer:
            extraArgs:
            - name: kubelet-preferred-address-types
              value: InternalIP,Hostname,ExternalIP

        files:
        - content: |
            placeholder — le contrôleur sanitize un tableau files vide,
            ce fichier factice permet de garder le tableau initialisé.
          owner: root:root
          path: /dev/null

        - path: /etc/kube-vip-prepare.sh
          owner: root:root
          permissions: "0700"
          content: |
            #!/bin/bash
            set -e
            KUBEADM_MINOR="$(kubeadm version -o short | cut -d '.' -f 2)"
            if [[ "$KUBEADM_MINOR" -lt "29" ]]; then
              exit 0
            fi
            IS_KUBEADM_INIT="false"
            if [[ -f /run/kubeadm/kubeadm.yaml ]]; then
              IS_KUBEADM_INIT="true"
            fi
            if [[ -f /etc/kubeadm.sh ]] && grep -q -e "kubeadm init" /etc/kubeadm.sh; then
              IS_KUBEADM_INIT="true"
            fi
            if [[ "$IS_KUBEADM_INIT" == "true" ]]; then
              sed -i 's#path: /etc/kubernetes/admin.conf#path: /etc/kubernetes/super-admin.conf#' \
                /etc/kubernetes/manifests/kube-vip.yaml
            fi

        preKubeadmCommands:
        # Fourni --node-ip à kubelet avant que kubeadm le (re)démarre.
        # Nécessaire depuis K8s 1.33 : kubelet ne lit plus --cloud-provider
        # et ne pose donc plus alpha.kubernetes.io/provided-node-ip sans --node-ip.
        # Sans cette annotation, le CCM ne peut pas déterminer l'InternalIP du node.
        - MY_IP=$(ip -4 addr show ens18 | grep -oP 'inet \K[\d.]+' | head -1) && echo "KUBELET_EXTRA_ARGS=--node-ip=${MY_IP}" > /etc/default/kubelet
        # Belt+suspenders : ajoute localhost et l'IP propre à /etc/hosts.
        # Le template Packer cloud-init devrait déjà inclure 127.0.0.1 localhost,
        # mais on le garantit ici pour les images non mises à jour.
        - grep -q '^127.0.0.1 localhost' /etc/hosts || echo '127.0.0.1 localhost' >> /etc/hosts
        - grep -q '^::1 localhost' /etc/hosts || echo '::1 localhost' >> /etc/hosts
        - echo "$(ip -4 addr show ens18 | grep -oP 'inet \K[\d.]+' | head -1) $(hostname)" >> /etc/hosts
        - /etc/kube-vip-prepare.sh

        initConfiguration:
          nodeRegistration:
            kubeletExtraArgs:
            # provider-id au format CAPMOX (proxmox://<uuid cloud-init>).
            # Valeur rendue par cloud-init Jinja2 au boot de la VM.
            # Doit correspondre à ProxmoxMachine.spec.providerID pour que
            # CAPI puisse lier Machine→Node.
            - name: provider-id
              value: "proxmox://'{{ ds.meta_data.instance_id }}'"
            - name: cloud-provider
              value: external

        joinConfiguration:
          nodeRegistration:
            kubeletExtraArgs:
            - name: provider-id
              value: "proxmox://'{{ ds.meta_data.instance_id }}'"
            - name: cloud-provider
              value: external
