# =============================================================================
# Kustomize — ClusterClass Talos
#
# Prévisualiser :  kubectl kustomize talos/
#
# Note : les addons CNI/CSI/kube-vip svc-lb ne sont PAS dupliqués ici.
# Ils sont déployés une seule fois via kubeadm-ubuntu/ et ciblent tous les
# clusters portant les labels caprox.eu/cni, caprox.eu/ccm, etc.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: caprox-kubernetes-engine

resources:
  - clusterclass.yaml
  - templates/talos-config-template.yaml
  - templates/talos-control-plane-template.yaml
  - templates/proxmox-cluster-template.yaml
  - templates/proxmox-machine-template-cp.yaml
  - templates/proxmox-machine-template-worker.yaml
