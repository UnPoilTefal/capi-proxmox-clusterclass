# =============================================================================
# ClusterClass proxmox-talos-clusterclass-v0.1.0
#
# Différences clés avec proxmox-clusterclass-v0.2.0 (kubeadm) :
#   - Bootstrap  : TalosConfigTemplate (CABPT) au lieu de KubeadmConfigTemplate
#   - ControlPlane : TalosControlPlaneTemplate (CACPPT) au lieu de KubeadmControlPlaneTemplate
#   - kube-vip : injecté via machine.files dans un configPatch Talos (pas cloud-init files)
#   - Pas de sshAuthorizedKeys : Talos n'a pas de SSH
#   - Pas de kubeProxy variable : Talos gère son propre proxy réseau
#   - kubeconfig kube-vip : /etc/kubernetes/admin.conf (Talos écrit ce fichier comme kubeadm)
#
# Providers requis sur le mgmt cluster (via app-cluster-api.yaml) :
#   CABPT  (bootstrap-provider-talos)      → CRDs TalosConfig / TalosConfigTemplate
#   CACPPT (controlplane-provider-talos)   → CRDs TalosControlPlane / TalosControlPlaneTemplate
#
# VERSION KUBE-VIP : ghcr.io/kube-vip/kube-vip:v1.0.0
# → mettre à jour aussi dans templates/svc-lb/ (kubeadm-ubuntu) si besoin
# =============================================================================
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: ClusterClass
metadata:
  name: proxmox-talos-clusterclass-v0.1.0
spec:

  infrastructure:
    templateRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
      kind: ProxmoxClusterTemplate
      name: proxmox-talos-clusterclass-v0.1.0-clustertemplate

  controlPlane:
    templateRef:
      apiVersion: controlplane.cluster.x-k8s.io/v1alpha3
      kind: TalosControlPlaneTemplate
      name: proxmox-talos-clusterclass-v0.1.0-cp-template
    machineInfrastructure:
      templateRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        name: proxmox-talos-clusterclass-v0.1.0-control-plane-template
    naming:
      template: '{{ .cluster.name }}-control-plane-{{ .random }}'
    healthCheck:
      checks:
        nodeStartupTimeoutSeconds: 900
        unhealthyNodeConditions:
        - type: Ready
          status: Unknown
          timeoutSeconds: 600
        - type: Ready
          status: "False"
          timeoutSeconds: 600

  workers:
    machineDeployments:
    - class: proxmox-worker
      infrastructure:
        templateRef:
          apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
          kind: ProxmoxMachineTemplate
          name: proxmox-talos-clusterclass-v0.1.0-worker-template
      bootstrap:
        templateRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
          kind: TalosConfigTemplate
          name: proxmox-talos-clusterclass-v0.1.0-worker-config-template
      naming:
        template: '{{ .cluster.name }}-worker-{{ .random }}'
      metadata:
        labels:
          node-role.kubernetes.io/worker: ""
          topology.kubernetes.io/region: Datacenter
      healthCheck:
        checks:
          nodeStartupTimeoutSeconds: 900
          unhealthyNodeConditions:
          - type: Ready
            status: Unknown
            timeoutSeconds: 600
          - type: Ready
            status: "False"
            timeoutSeconds: 600
        remediation:
          triggerIf:
            unhealthyLessThanOrEqualTo: 33%

  # ===========================================================================
  # VARIABLES
  # ===========================================================================
  variables:

  # ---------------------------------------------------------------------------
  # cloneSpec : sans sshAuthorizedKeys (Talos n'a pas de SSH).
  # virtualIPNetworkInterface : "" = auto-détection par kube-vip (recommandé).
  #   Sur Proxmox+virtio, l'interface Talos est eth0 (pas ens18 comme Ubuntu).
  # ---------------------------------------------------------------------------
  - name: cloneSpec
    required: false
    schema:
      openAPIV3Schema:
        type: object
        required:
        - vmTemplate
        properties:
          virtualIPNetworkInterface:
            type: string
            default: ""
            description: "Interface réseau pour kube-vip (ex: eth0). Vide = auto-détection."
          vmTemplate:
            type: object
            required:
            - templateTag
            properties:
              templateTag:
                type: string
                example: "talos-v1-13-4"
          machineSpec:
            type: object
            properties:
              controlPlane: &machineSpec
                type: object
                properties:
                  numCores:
                    type: integer
                    example: 2
                  numSockets:
                    type: integer
                    example: 1
                  memoryMiB:
                    type: integer
                    example: 4096
                  format:
                    type: string
                    enum: [raw, qcow2, vmdk]
                  storage:
                    type: string
                  disks:
                    type: object
                    properties:
                      bootVolume:
                        type: object
                        required:
                        - disk
                        - sizeGb
                        properties:
                          disk:
                            type: string
                          sizeGb:
                            type: integer
                            minimum: 5
                            format: int32
                  network:
                    type: object
                    required:
                    - default
                    properties:
                      default:
                        type: object
                        required:
                        - bridge
                        properties:
                          bridge:
                            type: string
                          model:
                            type: string
                            default: virtio
                            enum: [e1000, virtio, rtl8139, vmxnet3]
                      additionalDevices:
                        type: array
                        items:
                          type: object
                          required:
                          - bridge
                          - name
                          properties:
                            bridge:
                              type: string
                            name:
                              type: string
                              minLength: 1
                            model:
                              type: string
                              default: virtio
                              enum: [e1000, virtio, rtl8139, vmxnet3]
              workerNode: *machineSpec
              loadBalancer: *machineSpec

  - name: controlPlaneEndpoint
    required: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          host:
            type: string
            example: "192.168.40.241"
          port:
            type: integer
            default: 6443

  - name: ipv4Config
    required: true
    schema:
      openAPIV3Schema:
        type: object
        required:
        - addresses
        - gateway
        properties:
          addresses:
            type: array
            items:
              type: string
            example: ["192.168.40.26-192.168.40.40"]
          gateway:
            type: string
            example: "192.168.40.254"
          prefix:
            type: integer
            default: 24

  - name: allowedNodes
    required: false
    schema:
      openAPIV3Schema:
        type: array
        items:
          type: string
        default: []
        example: ["prox-node-01", "prox-node-02", "prox-node-03"]

  - name: dnsServers
    required: false
    schema:
      openAPIV3Schema:
        type: array
        minItems: 1
        items:
          type: string
        default: ["8.8.8.8", "1.1.1.1"]
        example: ["192.168.40.254"]

  # ===========================================================================
  # PATCHES
  # ===========================================================================
  patches:

  # ---------------------------------------------------------------------------
  # ProxmoxCluster : endpoint VIP, pool IP, DNS, nœuds autorisés
  # Identique au patch kubeadm — cible ProxmoxClusterTemplate.
  # ---------------------------------------------------------------------------
  - name: ProxmoxClusterTemplateGeneral
    description: "Configure ProxmoxCluster : VIP, pool IPv4, DNS, allowedNodes"
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxClusterTemplate
        matchResources:
          infrastructureCluster: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/allowedNodes
        valueFrom:
          variable: allowedNodes
      - op: add
        path: /spec/template/spec/controlPlaneEndpoint/host
        valueFrom:
          variable: controlPlaneEndpoint.host
      - op: add
        path: /spec/template/spec/controlPlaneEndpoint/port
        valueFrom:
          variable: controlPlaneEndpoint.port
      - op: replace
        path: /spec/template/spec/dnsServers
        valueFrom:
          variable: dnsServers
      - op: replace
        path: /spec/template/spec/ipv4Config/addresses
        valueFrom:
          variable: ipv4Config.addresses
      - op: replace
        path: /spec/template/spec/ipv4Config/gateway
        valueFrom:
          variable: ipv4Config.gateway
      - op: replace
        path: /spec/template/spec/ipv4Config/prefix
        valueFrom:
          variable: ipv4Config.prefix

  # ---------------------------------------------------------------------------
  # Control Plane : kube-vip static pod + tag template Proxmox
  #
  # Injection kube-vip via Talos configPatch (machine.files) :
  #   op: add sur /spec/template/spec/controlPlaneConfig/configPatches crée ou
  #   remplace le tableau — valueFrom.template génère un tableau YAML à 1 élément.
  #   Cet élément est lui-même un JSON patch Talos (op/path/value) qui injecte
  #   le fichier kube-vip dans /etc/kubernetes/manifests/ au moment du boot.
  #
  # kubeconfig kube-vip :
  #   Talos v1.x écrit /etc/kubernetes/admin.conf pendant le bootstrap —
  #   même chemin qu'en kubeadm → le manifest est identique.
  #   permissions: 420 = 0644 en décimal (format JSON Patch, pas octal).
  # ---------------------------------------------------------------------------
  - name: ControlPlaneSetup
    description: "Configure CP : kube-vip static pod (configPatch Talos), tag template Proxmox"
    definitions:
    - selector:
        apiVersion: controlplane.cluster.x-k8s.io/v1alpha3
        kind: TalosControlPlaneTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/controlPlaneConfig/configPatches
        valueFrom:
          template: |
            - op: add
              path: /machine/files/-
              value:
                content: |
                  apiVersion: v1
                  kind: Pod
                  metadata:
                    name: kube-vip
                    namespace: kube-system
                  spec:
                    containers:
                    - args:
                      - manager
                      env:
                      - name: vip_arp
                        value: "true"
                      - name: port
                        value: "6443"
                      - name: vip_nodename
                        valueFrom:
                          fieldRef:
                            fieldPath: spec.nodeName
                      - name: vip_interface
                        value: "{{ .cloneSpec.virtualIPNetworkInterface }}"
                      - name: vip_subnet
                        value: "32"
                      - name: dns_mode
                        value: first
                      - name: cp_enable
                        value: "true"
                      - name: cp_namespace
                        value: kube-system
                      - name: svc_leasename
                        value: plndr-svcs-lock
                      - name: address
                        value: "{{ .controlPlaneEndpoint.host }}"
                      image: ghcr.io/kube-vip/kube-vip:v1.0.0
                      imagePullPolicy: IfNotPresent
                      name: kube-vip
                      resources: {}
                      securityContext:
                        capabilities:
                          add:
                          - NET_ADMIN
                          - NET_RAW
                          drop:
                          - ALL
                      volumeMounts:
                      - mountPath: /etc/kubernetes/admin.conf
                        name: kubeconfig
                    hostAliases:
                    - hostnames:
                      - kubernetes
                      ip: 127.0.0.1
                    hostNetwork: true
                    volumes:
                    - hostPath:
                        path: /etc/kubernetes/admin.conf
                      name: kubeconfig
                path: /etc/kubernetes/manifests/kube-vip.yaml
                permissions: 420
                op: create
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: replace
        path: /spec/template/spec/templateSelector/matchTags
        valueFrom:
          template: |
            [ "{{ .cloneSpec.vmTemplate.templateTag }}" ]

  # ---------------------------------------------------------------------------
  # Workers : tag template Proxmox uniquement (pas de kube-vip sur les workers)
  # ---------------------------------------------------------------------------
  - name: WorkerNodeSetup
    description: "Configure Workers : tag template Proxmox"
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        matchResources:
          controlPlane: false
          machineDeploymentClass:
            names:
            - proxmox-worker
      jsonPatches:
      - op: replace
        path: /spec/template/spec/templateSelector/matchTags
        valueFrom:
          template: |
            [ "{{ .cloneSpec.vmTemplate.templateTag }}" ]

  # ---------------------------------------------------------------------------
  # Overrides VM Control Plane (optionnels via enabledIf)
  # ---------------------------------------------------------------------------
  - name: ControlPlaneCores
    description: "Override CPU cores CP"
    enabledIf: '{{ if .cloneSpec.machineSpec.controlPlane.numCores }}true{{ end }}'
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/numCores
        valueFrom:
          variable: cloneSpec.machineSpec.controlPlane.numCores

  - name: ControlPlaneMem
    description: "Override RAM (MiB) CP"
    enabledIf: '{{ if .cloneSpec.machineSpec.controlPlane.memoryMiB }}true{{ end }}'
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/memoryMiB
        valueFrom:
          variable: cloneSpec.machineSpec.controlPlane.memoryMiB

  - name: ControlPlaneNodeSockets
    description: "Override sockets CP"
    enabledIf: '{{ if .cloneSpec.machineSpec.controlPlane.numSockets }}true{{ end }}'
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/numSockets
        valueFrom:
          variable: cloneSpec.machineSpec.controlPlane.numSockets

  - name: ControlPlaneBootDisk
    description: "Override disque boot CP (device + taille)"
    enabledIf: '{{ if .cloneSpec.machineSpec.controlPlane.disks.bootVolume.sizeGb }}true{{ end }}'
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/disks
        value: {}
      - op: add
        path: /spec/template/spec/disks/bootVolume
        value: {}
      - op: add
        path: /spec/template/spec/disks/bootVolume/disk
        valueFrom:
          variable: cloneSpec.machineSpec.controlPlane.disks.bootVolume.disk
      - op: add
        path: /spec/template/spec/disks/bootVolume/sizeGb
        valueFrom:
          variable: cloneSpec.machineSpec.controlPlane.disks.bootVolume.sizeGb

  - name: ControlPlaneBootDiskStorage
    description: "Override storage cible CP"
    enabledIf: '{{ if .cloneSpec.machineSpec.controlPlane.storage }}true{{ end }}'
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/storage
        valueFrom:
          variable: cloneSpec.machineSpec.controlPlane.storage

  - name: ControlPlaneCloneDiskFormat
    description: "Override format disque CP"
    enabledIf: '{{ if .cloneSpec.machineSpec.controlPlane.format }}true{{ end }}'
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: replace
        path: /spec/template/spec/format
        valueFrom:
          variable: cloneSpec.machineSpec.controlPlane.format

  - name: ControlPlaneDefaultNetwork
    description: "Override réseau CP"
    enabledIf: '{{ if .cloneSpec.machineSpec.controlPlane.network }}true{{ end }}'
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: /spec/template/spec/network
        valueFrom:
          variable: cloneSpec.machineSpec.controlPlane.network

  # ---------------------------------------------------------------------------
  # Overrides VM Workers (optionnels via enabledIf)
  # ---------------------------------------------------------------------------
  - name: WorkerNodeCores
    description: "Override CPU cores workers"
    enabledIf: '{{ if .cloneSpec.machineSpec.workerNode.numCores }}true{{ end }}'
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        matchResources:
          controlPlane: false
          machineDeploymentClass:
            names:
            - proxmox-worker
      jsonPatches:
      - op: add
        path: /spec/template/spec/numCores
        valueFrom:
          variable: cloneSpec.machineSpec.workerNode.numCores

  - name: WorkerNodeMem
    description: "Override RAM (MiB) workers"
    enabledIf: '{{ if .cloneSpec.machineSpec.workerNode.memoryMiB }}true{{ end }}'
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        matchResources:
          controlPlane: false
          machineDeploymentClass:
            names:
            - proxmox-worker
      jsonPatches:
      - op: add
        path: /spec/template/spec/memoryMiB
        valueFrom:
          variable: cloneSpec.machineSpec.workerNode.memoryMiB

  - name: WorkerNodeSockets
    description: "Override sockets workers"
    enabledIf: '{{ if .cloneSpec.machineSpec.workerNode.numSockets }}true{{ end }}'
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        matchResources:
          controlPlane: false
          machineDeploymentClass:
            names:
            - proxmox-worker
      jsonPatches:
      - op: add
        path: /spec/template/spec/numSockets
        valueFrom:
          variable: cloneSpec.machineSpec.workerNode.numSockets

  - name: WorkerNodeBootDisk
    description: "Override disque boot workers"
    enabledIf: '{{ if .cloneSpec.machineSpec.workerNode.disks.bootVolume.sizeGb }}true{{ end }}'
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        matchResources:
          controlPlane: false
          machineDeploymentClass:
            names:
            - proxmox-worker
      jsonPatches:
      - op: add
        path: /spec/template/spec/disks
        value: {}
      - op: add
        path: /spec/template/spec/disks/bootVolume
        value: {}
      - op: add
        path: /spec/template/spec/disks/bootVolume/disk
        valueFrom:
          variable: cloneSpec.machineSpec.workerNode.disks.bootVolume.disk
      - op: add
        path: /spec/template/spec/disks/bootVolume/sizeGb
        valueFrom:
          variable: cloneSpec.machineSpec.workerNode.disks.bootVolume.sizeGb

  - name: WorkerNodeBootDiskStorage
    description: "Override storage cible workers"
    enabledIf: '{{ if .cloneSpec.machineSpec.workerNode.storage }}true{{ end }}'
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        matchResources:
          controlPlane: false
          machineDeploymentClass:
            names:
            - proxmox-worker
      jsonPatches:
      - op: add
        path: /spec/template/spec/storage
        valueFrom:
          variable: cloneSpec.machineSpec.workerNode.storage

  - name: WorkerNodeDefaultNetwork
    description: "Override réseau workers"
    enabledIf: '{{ if .cloneSpec.machineSpec.workerNode.network }}true{{ end }}'
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
        kind: ProxmoxMachineTemplate
        matchResources:
          controlPlane: false
          machineDeploymentClass:
            names:
            - proxmox-worker
      jsonPatches:
      - op: add
        path: /spec/template/spec/network
        valueFrom:
          variable: cloneSpec.machineSpec.workerNode.network
