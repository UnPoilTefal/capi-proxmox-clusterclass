# Patch WorkerNodeSetup — SSH keys + template tag pour les workers
- op: add
  path: /spec/patches/-
  value:
    name: WorkerNodeSetup
    description: "Configure Workers : SSH keys, template tag"
    definitions:
      - selector:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
          kind: KubeadmConfigTemplate
          matchResources:
            machineDeploymentClass:
              names:
              - proxmox-worker
        jsonPatches:
          - op: add
            path: /spec/template/spec/users
            valueFrom:
              template: |
                - name: root
                  sshAuthorizedKeys: {{ .cloneSpec.sshAuthorizedKeys }}
      - selector:
          apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
          kind: ProxmoxMachineTemplate
          matchResources:
            controlPlane: false
            machineDeploymentClass:
              names:
              - proxmox-worker
        jsonPatches:
          - op: replace
            path: /spec/template/spec/templateSelector/matchTags
            valueFrom:
              template: |
                [ "{{ .cloneSpec.vmTemplate.templateTag }}" ]
