- op: add
  path: /spec/patches/-
  value:
    name: ControlPlaneBootDiskStorage
    description: "Override storage cible du disque boot CP (ex: local-lvm)"
    enabledIf: "{{ if .cloneSpec.machineSpec.controlPlane.disks.bootVolume.storage }}true{{ end }}"
    definitions:
      - selector:
          apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
          kind: ProxmoxMachineTemplate
          matchResources:
            controlPlane: true
        jsonPatches:
          - op: add
            path: /spec/template/spec/storage
            valueFrom:
              variable: cloneSpec.machineSpec.controlPlane.disks.bootVolume.storage
