- op: add
  path: /spec/patches/-
  value:
    name: WorkerNodeBootDiskStorage
    description: "Override storage cible du disque boot workers (ex: local-lvm)"
    enabledIf: "{{ if .cloneSpec.machineSpec.workerNode.disks.bootVolume.storage }}true{{ end }}"
    definitions:
      - selector:
          apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
          kind: ProxmoxMachineTemplate
          matchResources:
            controlPlane: false
            machineDeploymentClass:
              names:
              - proxmox-worker
        jsonPatches:
          - op: add
            path: /spec/template/spec/disks/bootVolume/storage
            valueFrom:
              variable: cloneSpec.machineSpec.workerNode.disks.bootVolume.storage
