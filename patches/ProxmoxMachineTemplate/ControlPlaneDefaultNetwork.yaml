# Patch ControlPlaneDefaultNetwork — surcharge la config réseau CP
# ATTENTION : ce patch remplace l'intégralité du champ /spec/template/spec/network.
# Si utilisé, le bridge et le modèle viennent de la variable
# cloneSpec.machineSpec.controlPlane.network.default (bridge requis).
# → Si non utilisé (variable non définie), le bridge vmbr40 du template de base est conservé.
- op: add
  path: /spec/patches/-
  value:
    name: ControlPlaneDefaultNetwork
    description: "Override réseau CP (bridge, model)"
    enabledIf: "{{ if .cloneSpec.machineSpec.controlPlane.network }}true{{ end }}"
    definitions:
      - selector:
          apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
          kind: ProxmoxMachineTemplate
          matchResources:
            controlPlane: true
        jsonPatches:
          - op: add
            path: /spec/template/spec/network
            valueFrom:
              variable: cloneSpec.machineSpec.controlPlane.network
