# Patch ProxmoxClusterTemplateGeneral — injecte les variables cluster dans ProxmoxClusterTemplate
# Configure : allowedNodes (nœuds Proxmox autorisés), controlPlaneEndpoint (VIP), dnsServers
- op: add
  path: /spec/patches/-
  value:
    name: ProxmoxClusterTemplateGeneral
    description: "Configure ProxmoxCluster : allowedNodes, VIP endpoint, DNS"
    definitions:
      - selector:
          apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
          kind: ProxmoxClusterTemplate
          matchResources:
            infrastructureCluster: true
        jsonPatches:
          - op: add
            path: /spec/template/spec/allowedNodes
            valueFrom:
              variable: allowedNodes
          - op: add
            path: /spec/template/spec/controlPlaneEndpoint/host
            valueFrom:
              variable: controlPlaneEndpoint.host
          - op: add
            path: /spec/template/spec/controlPlaneEndpoint/port
            valueFrom:
              variable: controlPlaneEndpoint.port
          - op: replace
            path: /spec/template/spec/dnsServers
            valueFrom:
              variable: dnsServers
