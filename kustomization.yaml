# =============================================================================
# Kustomize root — agrège toutes les ClusterClass du repo
#
# Prévisualiser :  kubectl kustomize .
# Déployer     :  kubectl kustomize . | kubectl apply -f -
#
# Structure :
#   ns.yaml           → namespace partagé caprox-kubernetes-engine
#   kubeadm-ubuntu/   → ClusterClass kubeadm + Ubuntu 26.04
#   talos/            → ClusterClass Talos (désactivé : TalosControlPlaneTemplate
#                       n'est pas implémentée dans CACPPT v0.5.x ; utiliser
#                       TalosControlPlane standalone dans clusters/app-talos/)
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ns.yaml
  - kubeadm-ubuntu/
