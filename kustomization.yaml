# =============================================================================
# Kustomize root — agrège toutes les ClusterClass du repo
#
# Prévisualiser :  kubectl kustomize .
# Déployer     :  kubectl kustomize . | kubectl apply -f -
#
# Structure :
#   ns.yaml           → namespace partagé caprox-kubernetes-engine
#   kubeadm-ubuntu/   → ClusterClass kubeadm + Ubuntu 26.04
#   talos/            → ClusterClass Talos Linux (proxmox-talos-clusterclass-v0.1.0)
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ns.yaml
  - kubeadm-ubuntu/
  - talos/
