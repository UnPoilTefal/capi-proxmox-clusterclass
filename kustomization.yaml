# =============================================================================
# Kustomize root — assemble le ClusterClass, ses Templates et ses Addons
#
# Prévisualiser :  kubectl kustomize .
# Déployer     :  kubectl kustomize . | kubectl apply -f -
#
# Le ClusterClass (clusterclass.yaml) est désormais complet en lui-même :
# variables et patches sont inline, aucun patch Kustomize n'est nécessaire
# pour le ClusterClass. Kustomize sert uniquement à namespace-er et assembler
# les ressources en un seul apply.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: caprox-kubernetes-engine

resources:
  - ns.yaml
  - clusterclass.yaml
  - templates/kubeadm-config-template.yaml
  - templates/kubeadm-control-plane-template.yaml
  - templates/proxmox-cluster-template.yaml
  - templates/proxmox-machine-template-cp.yaml
  - templates/proxmox-machine-template-worker.yaml
  - templates/cni
  - templates/csi
  - templates/svc-lb
