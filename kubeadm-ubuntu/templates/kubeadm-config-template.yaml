# =============================================================================
# KubeadmConfigTemplate — configuration kubeadm des nœuds Workers
# =============================================================================
#
# Miroir de la section joinConfiguration du KubeadmControlPlaneTemplate
# mais pour les workers. Le patch WorkerNodeSetup.yaml injecte les SSH keys.
#
# Voir kubeadm-control-plane-template.yaml pour le détail des choix
# provider-id, --node-ip et /etc/hosts.
# =============================================================================
kind: KubeadmConfigTemplate
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
metadata:
  name: proxmox-kubernetes-engine-workertemplate
spec:
  template:
    spec:
      preKubeadmCommands:
      - MY_IP=$(ip -4 addr show ens18 | grep -oP 'inet \K[\d.]+' | head -1) && echo "KUBELET_EXTRA_ARGS=--node-ip=${MY_IP}" > /etc/default/kubelet
      - grep -q '^127.0.0.1 localhost' /etc/hosts || echo '127.0.0.1 localhost' >> /etc/hosts
      - grep -q '^::1 localhost' /etc/hosts || echo '::1 localhost' >> /etc/hosts
      - echo "$(ip -4 addr show ens18 | grep -oP 'inet \K[\d.]+' | head -1) $(hostname)" >> /etc/hosts

      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
          - name: provider-id
            value: "proxmox://'{{ ds.meta_data.instance_id }}'"
          - name: cloud-provider
            value: external
