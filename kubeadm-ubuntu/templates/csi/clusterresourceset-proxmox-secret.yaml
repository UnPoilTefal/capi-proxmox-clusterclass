# =============================================================================
# ClusterResourceSet — injection du Secret Proxmox dans les clusters workload
# =============================================================================
#
# RÔLE :
#   Copie le Secret "proxmox-credentials" du namespace caprox-kubernetes-engine
#   (mgmt cluster) vers le namespace kube-system de chaque cluster workload.
#   Ce secret contient les credentials Proxmox API pour le CCM et le CSI.
#
# PRÉREQUIS :
#   Le Secret "proxmox-credentials" doit exister dans caprox-kubernetes-engine
#   sur le mgmt cluster (voir bootstrap-cluster/secret-capmox.yaml adapté).
#
# ACTIVATION : label caprox.eu/inject-proxmox-credentials: "true" sur le Cluster CR
#
# PRÉREQUIS :
#   Les deux Secrets suivants doivent exister dans caprox-kubernetes-engine sur le mgmt cluster
#   (appliqués par bootstrap.sh via bootstrap-cluster/secret-proxmox-workload.yaml) :
#     - ccm-config         : config YAML du CCM (URL Proxmox, token)
#     - proxmox-credentials: credentials bruts pour le pod CCM (et futur CSI)
# =============================================================================
apiVersion: addons.cluster.x-k8s.io/v1beta2
kind: ClusterResourceSet
metadata:
  name: proxmox-credentials
spec:
  strategy: Reconcile
  clusterSelector:
    matchLabels:
      caprox.eu/inject-proxmox-credentials: "true"
  resources:
    - name: ccm-config
      kind: Secret
    - name: proxmox-credentials
      kind: Secret
